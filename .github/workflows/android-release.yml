name: Android Release

# Builds a signed release APK + AAB, then publishes a GitHub Release with the
# APK as a public download asset. Triggered by a version tag (e.g. v2.0.0)
# or manually via workflow_dispatch.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   – base64 of android/release.jks
#                       Generate: base64 -w0 android/release.jks | pbcopy
#   KEYSTORE_PASSWORD – keystore password (fsdRelease2026! or whatever yours is)
#   KEY_ALIAS         – key alias (fsd)
#   KEY_PASSWORD      – key password

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create GitHub Release?"
        type: boolean
        default: true

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed release APK + AAB (free flavor)
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleFreeRelease bundleFreeRelease

      - name: Rename artifacts for clean filenames
        run: |
          mkdir -p ../dist
          cp app/build/outputs/apk/free/release/app-free-release.apk \
             ../dist/FreeAndroidDoctor-free.apk
          cp app/build/outputs/bundle/freeRelease/app-free-release.aab \
             ../dist/FreeAndroidDoctor-free.aab
        working-directory: android

      # Permanent public URL after this step:
      # https://github.com/caytec/FreeAndroidDoctor/releases/latest/download/FreeAndroidDoctor-free.apk
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "FreeAndroidDoctor $TAG" \
            --notes "## FreeAndroidDoctor $TAG

          **Pobierz APK** (poniżej) i zainstaluj ręcznie na telefonie.
          Wymagany Android 8.0+.

          ### Jak zainstalować
          1. Pobierz \`FreeAndroidDoctor-free.apk\`
          2. Otwórz plik na telefonie
          3. Gdy pojawi się komunikat o nieznanym źródle — zezwól dla przeglądarki/pliku
          4. Zainstaluj i gotowe

          ---

          **Download APK** below and sideload on any Android 8.0+ phone.
          " \
            --latest \
            ../dist/FreeAndroidDoctor-free.apk \
            ../dist/FreeAndroidDoctor-free.aab
        working-directory: android

      - name: Upload APK artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: fsd-release-apk
          path: dist/FreeAndroidDoctor-free.apk
          if-no-files-found: warn
