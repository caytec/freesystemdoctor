name: Android Release

# Builds a signed release AAB + APK. Triggered manually or by a version tag.
# Configure these repository secrets first (Settings → Secrets → Actions):
#   KEYSTORE_BASE64   - base64 of android/release.jks  (base64 -w0 release.jks)
#   KEYSTORE_PASSWORD - keystore password
#   KEY_ALIAS         - key alias (e.g. fsd)
#   KEY_PASSWORD      - key password
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build signed AAB + APK
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Upload AAB (for Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: fsd-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload APK (for sideload)
        uses: actions/upload-artifact@v4
        with:
          name: fsd-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
