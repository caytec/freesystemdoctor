<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 740" role="img" aria-label="Dashboard screen mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F1B2D"/>
      <stop offset="100%" stop-color="#0A1320"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FF6F61"/>
      <stop offset="100%" stop-color="#9C7BFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.25" r="0.6">
      <stop offset="0%"  stop-color="#FF6F61" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FF6F61" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="360" height="740" rx="36" fill="url(#bg)"/>
  <circle cx="180" cy="200" r="220" fill="url(#glow)"/>
  <rect x="160" y="14" width="40" height="6" rx="3" fill="#0A1320"/>

  <!-- top bar -->
  <text x="24"  y="64" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="20" font-weight="700" fill="#ECEFF4" data-i18n="dashboard.title">Device health</text>
  <text x="336" y="64" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="14" fill="#FF6F61" text-anchor="end">PRO</text>

  <!-- Big gauge -->
  <g transform="translate(180 220)">
    <g transform="rotate(135 0 0)">
      <circle r="76" fill="none" stroke="#1E3350" stroke-width="14"
              stroke-linecap="round" stroke-dasharray="358 478"/>
      <circle r="76" fill="none" stroke="url(#ring)" stroke-width="14"
              stroke-linecap="round" stroke-dasharray="304 478"/>
    </g>
    <text y="6" font-family="sans-serif" font-size="42" font-weight="800" fill="#ECEFF4" text-anchor="middle">87</text>
    <text y="30" font-family="sans-serif" font-size="11" fill="#A7B4C7" text-anchor="middle" letter-spacing="2" data-i18n="dashboard.gauge">HEALTH SCORE</text>
  </g>

  <!-- 4 stat cards -->
  <g font-family="sans-serif">
    <rect x="20"  y="340" width="160" height="86" rx="14" fill="#16263D"/>
    <text x="36"  y="364" font-size="10" fill="#A7B4C7" letter-spacing="1.5" data-i18n="dashboard.storage">STORAGE</text>
    <text x="36"  y="392" font-size="22" font-weight="800" fill="#35D0BA">62 GB</text>
    <text x="36"  y="412" font-size="11" fill="#A7B4C7" data-i18n="dashboard.storage_sub">free of 128 GB</text>

    <rect x="184" y="340" width="156" height="86" rx="14" fill="#16263D"/>
    <text x="200" y="364" font-size="10" fill="#A7B4C7" letter-spacing="1.5" data-i18n="dashboard.ram">RAM</text>
    <text x="200" y="392" font-size="22" font-weight="800" fill="#FF6F61">3.2 GB</text>
    <text x="200" y="412" font-size="11" fill="#A7B4C7" data-i18n="dashboard.ram_sub">used of 8 GB</text>

    <rect x="20"  y="436" width="160" height="86" rx="14" fill="#16263D"/>
    <text x="36"  y="460" font-size="10" fill="#A7B4C7" letter-spacing="1.5" data-i18n="dashboard.battery">BATTERY</text>
    <text x="36"  y="488" font-size="22" font-weight="800" fill="#9C7BFF">82%</text>
    <text x="36"  y="508" font-size="11" fill="#A7B4C7" data-i18n="dashboard.battery_sub">28°C · charging</text>

    <rect x="184" y="436" width="156" height="86" rx="14" fill="#16263D"/>
    <text x="200" y="460" font-size="10" fill="#A7B4C7" letter-spacing="1.5" data-i18n="dashboard.device">DEVICE</text>
    <text x="200" y="488" font-size="18" font-weight="800" fill="#4FC3F7">Pixel 7</text>
    <text x="200" y="508" font-size="11" fill="#A7B4C7">Android 14 · arm64-v8a</text>
  </g>

  <!-- CTA -->
  <rect x="20" y="552" width="320" height="56" rx="18" fill="url(#ring)"/>
  <text x="180" y="586" font-family="sans-serif" font-size="16" font-weight="700" fill="#0A1320" text-anchor="middle" data-i18n="dashboard.cta">RUN HEALTH CHECK</text>

  <!-- Bottom nav -->
  <rect x="20" y="664" width="320" height="56" rx="20" fill="#16263D"/>
  <g font-family="sans-serif" font-size="10" fill="#A7B4C7" text-anchor="middle">
    <circle cx="60"  cy="688" r="4" fill="#FF6F61"/>
    <text x="60"  y="710" fill="#FF6F61" data-i18n="nav.dashboard">Dashboard</text>
    <text x="124" y="710" data-i18n="nav.cleaner">Clean</text>
    <text x="188" y="710" data-i18n="nav.storage">Storage</text>
    <text x="252" y="710" data-i18n="nav.apps">Apps</text>
    <text x="316" y="710" data-i18n="nav.tools">Tools</text>
  </g>
</svg>
