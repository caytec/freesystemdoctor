<main class="changelog-list" id="changelog">

<script>
// Klasyfikacja commitГіw wg konwencji conventional commits + heurystyki
function classifyCommit(msg) {
  const m = msg.toLowerCase();
  if (m.match(/^(feat|feature|add|nowy|dodaj|stwГіrz)/)) return "feat";
  if (m.match(/^(fix|napraw|popraw|bug)/))               return "fix";
  if (m.match(/^(docs|doc|readme)/))                      return "docs";
  if (m.match(/^(refactor|refaktor|cleanup|przepisz)/))   return "refactor";
  if (m.match(/^(chore|build|ci|deps|bump)/))             return "chore";
  return "chore";
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('pl-PL', { year: 'numeric', month: 'long', day: 'numeric' });
}

function groupByDate(commits) {
  const groups = {};
  commits.forEach(c => {
    const day = c.date.split('T')[0];
    if (!groups[day]) groups[day] = [];
    groups[day].push(c);
  });
  return groups;
}

async function loadChangelog() {
  const target = document.getElementById('changelog');
  const updatedEl = document.getElementById('last-updated');
  try {
    const resp = await fetch('changelog.json?t=' + Date.now());
    if (!resp.ok) throw new Error('changelog.json niedostД™pny');
    const data = await resp.json();
    const commits = data.commits || [];

    if (commits.length === 0) {
      target.innerHTML = '<div class="changelog-empty"><p>Brak commitГіw do wyЕ›wietlenia.</p></div>';
      return;
    }

    if (data.updated) {
      updatedEl.textContent = 'рџ”„ Ostatnia aktualizacja: ' + formatDate(data.updated);
    }

    const groups = groupByDate(commits);
    const days = Object.keys(groups).sort().reverse();

    target.innerHTML = days.map(day => {
      const dayCommits = groups[day];
      const commitsHtml = dayCommits.map(c => {
        const tag = classifyCommit(c.msg);
        const cleanMsg = c.msg.replace(/^(feat|fix|docs|refactor|chore|add|napraw|popraw|nowy|dodaj|stwГіrz)[:\s]*/i, '');
        const shaShort = c.sha ? c.sha.substring(0, 7) : '';
        return `
          <div class="changelog-commit">
            <span class="commit-tag ${tag}">${tag}</span>
            <span class="commit-msg">
              ${escapeHtml(cleanMsg)}
              ${shaShort ? `<a href="https://github.com/caytec/freesystemdoctor/commit/${c.sha}" target="_blank" class="commit-sha">${shaShort}</a>` : ''}
            </span>
          </div>
        `;
      }).join('');

      return `
        <article class="changelog-entry">
          <div class="changelog-date">${formatDate(day)}</div>
          <div class="changelog-commits">${commitsHtml}</div>
        </article>
      `;
    }).join('');

  } catch (err) {
    target.innerHTML = `
      <div class="changelog-empty">
        <p>Nie udaЕ‚o siД™ zaЕ‚adowaД‡ changeloga.</p>
        <p style="margin-top:12px;font-size:13px;">
          SprawdЕє <a href="https://github.com/caytec/freesystemdoctor/commits/main" target="_blank">historiД™ commitГіw na GitHubie</a>.
        </p>
      </div>
    `;
    updatedEl.textContent = 'Brak danych';
  }
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

loadChangelog();
</script>

</body>
