<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 740" role="img" aria-label="Tools hub mockup">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F1B2D"/>
      <stop offset="100%" stop-color="#0A1320"/>
    </linearGradient>
  </defs>

  <rect width="360" height="740" rx="36" fill="url(#bg3)"/>
  <rect x="160" y="14" width="40" height="6" rx="3" fill="#0A1320"/>

  <text x="24" y="64" font-family="sans-serif" font-size="20" font-weight="700" fill="#ECEFF4" data-i18n="tools.title">Tools</text>

  <!-- Group title -->
  <text x="24" y="100" font-family="sans-serif" font-size="13" font-weight="600" fill="#A7B4C7" letter-spacing="1" data-i18n="tools.group_files">FILES &amp; STORAGE</text>

  <!-- Tool grid 2x — 6 tiles -->
  <g font-family="sans-serif">
    <!-- row 1 -->
    <rect x="20"  y="116" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="44" cy="142" r="18" fill="#FF6F61" fill-opacity="0.16"/>
    <text x="44" y="148" font-size="18" fill="#FF6F61" text-anchor="middle">⊜</text>
    <text x="32" y="190" font-size="11" fill="#ECEFF4" data-i18n="tool.duplicates">Duplicates</text>
    <text x="32" y="204" font-size="9" fill="#A7B4C7">312 MB</text>

    <rect x="130" y="116" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="154" cy="142" r="18" fill="#9C7BFF" fill-opacity="0.16"/>
    <text x="154" y="148" font-size="18" fill="#9C7BFF" text-anchor="middle">▤</text>
    <text x="142" y="190" font-size="11" fill="#ECEFF4" data-i18n="tool.large_files">Large files</text>
    <text x="142" y="204" font-size="9" fill="#A7B4C7">1.8 GB</text>

    <rect x="240" y="116" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="264" cy="142" r="18" fill="#35D0BA" fill-opacity="0.16"/>
    <text x="264" y="148" font-size="18" fill="#35D0BA" text-anchor="middle">♺</text>
    <text x="252" y="190" font-size="11" fill="#ECEFF4" data-i18n="tool.recycle">Recycle bin</text>
    <text x="252" y="204" font-size="9" fill="#A7B4C7" data-i18n="tool.recycle_sub">7 items</text>

    <!-- row 2 -->
    <rect x="20"  y="226" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="44" cy="252" r="18" fill="#4FC3F7" fill-opacity="0.16"/>
    <text x="44" y="258" font-size="18" fill="#4FC3F7" text-anchor="middle">⌂</text>
    <text x="32" y="300" font-size="11" fill="#ECEFF4" data-i18n="tool.hidden">Hidden cache</text>
    <text x="32" y="314" font-size="9" fill="#A7B4C7">8 apps</text>

    <rect x="130" y="226" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="154" cy="252" r="18" fill="#FFB300" fill-opacity="0.16"/>
    <text x="154" y="258" font-size="18" fill="#FFB300" text-anchor="middle">▦</text>
    <text x="142" y="300" font-size="11" fill="#ECEFF4" data-i18n="tool.files">Folder analyzer</text>
    <text x="142" y="314" font-size="9" fill="#A7B4C7" data-i18n="tool.files_sub">SAF</text>

    <rect x="240" y="226" width="100" height="100" rx="16" fill="#16263D"/>
    <text x="290" y="262" font-size="9" font-weight="700" fill="#FF6F61" text-anchor="middle">PRO</text>
    <circle cx="264" cy="252" r="18" fill="#FF6F61" fill-opacity="0.16"/>
    <text x="264" y="258" font-size="18" fill="#FF6F61" text-anchor="middle">✕</text>
    <text x="252" y="300" font-size="11" fill="#ECEFF4" data-i18n="tool.shredder">Shredder</text>
    <text x="252" y="314" font-size="9" fill="#A7B4C7">DoD</text>
  </g>

  <!-- Group title 2 -->
  <text x="24" y="360" font-family="sans-serif" font-size="13" font-weight="600" fill="#A7B4C7" letter-spacing="1" data-i18n="tools.group_apps">APPS</text>

  <g font-family="sans-serif">
    <rect x="20"  y="376" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="44" cy="402" r="18" fill="#35D0BA" fill-opacity="0.16"/>
    <text x="44" y="408" font-size="18" fill="#35D0BA" text-anchor="middle">⌚</text>
    <text x="32" y="450" font-size="11" fill="#ECEFF4" data-i18n="tool.usage">Screen time</text>
    <text x="32" y="464" font-size="9" fill="#A7B4C7">5h 12m</text>

    <rect x="130" y="376" width="100" height="100" rx="16" fill="#16263D"/>
    <text x="180" y="412" font-size="9" font-weight="700" fill="#FF6F61" text-anchor="middle">PRO</text>
    <circle cx="154" cy="402" r="18" fill="#9C7BFF" fill-opacity="0.16"/>
    <text x="154" y="408" font-size="18" fill="#9C7BFF" text-anchor="middle">📈</text>
    <text x="142" y="450" font-size="11" fill="#ECEFF4" data-i18n="tool.insights">App insights</text>
    <text x="142" y="464" font-size="9" fill="#A7B4C7" data-i18n="tool.insights_sub">7-day</text>

    <rect x="240" y="376" width="100" height="100" rx="16" fill="#16263D"/>
    <text x="290" y="412" font-size="9" font-weight="700" fill="#FF6F61" text-anchor="middle">PRO</text>
    <circle cx="264" cy="402" r="18" fill="#FF6F61" fill-opacity="0.16"/>
    <text x="264" y="408" font-size="18" fill="#FF6F61" text-anchor="middle">🔒</text>
    <text x="252" y="450" font-size="11" fill="#ECEFF4" data-i18n="tool.vault">App vault</text>
    <text x="252" y="464" font-size="9" fill="#A7B4C7">AES-GCM</text>
  </g>

  <!-- Group title 3 -->
  <text x="24" y="510" font-family="sans-serif" font-size="13" font-weight="600" fill="#A7B4C7" letter-spacing="1" data-i18n="tools.group_system">SYSTEM</text>

  <g font-family="sans-serif">
    <rect x="20"  y="526" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="44" cy="552" r="18" fill="#9C7BFF" fill-opacity="0.16"/>
    <text x="44" y="558" font-size="18" fill="#9C7BFF" text-anchor="middle">▤</text>
    <text x="32" y="600" font-size="11" fill="#ECEFF4" data-i18n="tool.memory">Memory</text>

    <rect x="130" y="526" width="100" height="100" rx="16" fill="#16263D"/>
    <circle cx="154" cy="552" r="18" fill="#35D0BA" fill-opacity="0.16"/>
    <text x="154" y="558" font-size="18" fill="#35D0BA" text-anchor="middle">⚡</text>
    <text x="142" y="600" font-size="11" fill="#ECEFF4" data-i18n="tool.battery">Battery</text>

    <rect x="240" y="526" width="100" height="100" rx="16" fill="#16263D"/>
    <text x="290" y="562" font-size="9" font-weight="700" fill="#FF6F61" text-anchor="middle">PRO</text>
    <circle cx="264" cy="552" r="18" fill="#FFB300" fill-opacity="0.16"/>
    <text x="264" y="558" font-size="18" fill="#FFB300" text-anchor="middle">⏰</text>
    <text x="252" y="600" font-size="11" fill="#ECEFF4" data-i18n="tool.alarms">Battery alarms</text>
  </g>

  <rect x="20" y="664" width="320" height="56" rx="20" fill="#16263D"/>
  <g font-family="sans-serif" font-size="10" fill="#A7B4C7" text-anchor="middle">
    <text x="60" y="710" data-i18n="nav.dashboard">Dashboard</text>
    <text x="124" y="710" data-i18n="nav.cleaner">Clean</text>
    <text x="188" y="710" data-i18n="nav.storage">Storage</text>
    <text x="252" y="710" data-i18n="nav.apps">Apps</text>
    <circle cx="316" cy="688" r="4" fill="#FF6F61"/>
    <text x="316" y="710" fill="#FF6F61" data-i18n="nav.tools">Tools</text>
  </g>
</svg>
