name: Deploy Privacy Policy to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths: [ "privacy-android.html" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          mkdir -p _site
          cp privacy-android.html _site/privacy-android.html
          # Redirect bare index to privacy page for convenience
          printf '<!DOCTYPE html><meta http-equiv="refresh" content="0;url=privacy-android.html">' > _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
